# ============================================
# PREFIX
# ============================================
# Default prefix is Ctrl-b
bind C-b send-prefix

# ============================================
# GENERAL
# ============================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 50000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0
set -g focus-events on
set -g set-clipboard on

# ============================================
# SHELL
# ============================================
set -g default-shell /bin/zsh

# ============================================
# SPLITS
# ============================================
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ============================================
# PANE NAVIGATION (vim-style)
# ============================================
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ============================================
# PANE RESIZING
# ============================================
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ============================================
# WINDOW NAVIGATION
# ============================================
bind -r C-h previous-window
bind -r C-l next-window

# ============================================
# COPY MODE (vi keys)
# ============================================
setw -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ============================================
# RELOAD CONFIG
# ============================================
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ============================================
# STATUS BAR
# ============================================
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=colour235,fg=colour248"
set -g status-left "#[fg=colour232,bg=colour39,bold] #S #[fg=colour39,bg=colour235] "
set -g status-left-length 30
set -g status-right "#[fg=colour248] %H:%M #[fg=colour232,bg=colour39,bold] #h "
set -g status-right-length 40
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=colour232,bg=colour39,bold] #I:#W "

# ============================================
# PANE BORDERS
# ============================================
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"
